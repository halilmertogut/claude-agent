name: Orchestrator — Route Asana tasks to target repos

on:
  issues:
    types: [labeled]

jobs:
  dispatch:
    if: contains(github.event.issue.labels.*.name, 'claude-task')
    runs-on: ubuntu-latest

    steps:
      - name: Parse target repo from labels
        id: target
        env:
          LABELS_JSON: ${{ toJson(github.event.issue.labels.*.name) }}
        shell: bash
        run: |
          # Labels: "claude-task" + one of "fe" or "be"
          if echo "$LABELS_JSON" | grep -q '"fe"'; then
            echo "repo=Cathoven-AI/nexthub" >> "$GITHUB_OUTPUT"
            echo "target=fe" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS_JSON" | grep -q '"be"'; then
            echo "repo=Cathoven-AI/cathoven" >> "$GITHUB_OUTPUT"
            echo "target=be" >> "$GITHUB_OUTPUT"
          else
            echo "repo=none" >> "$GITHUB_OUTPUT"
            echo "target=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment if no target
        if: steps.target.outputs.repo == 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "Missing target label. Add **fe** or **be** label to route this task."

      - name: Dispatch to target repo
        if: steps.target.outputs.repo != 'none'
        env:
          GH_TOKEN: ${{ secrets.ORG_DISPATCH_TOKEN }}
          TARGET_REPO: ${{ steps.target.outputs.repo }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        shell: bash
        run: |
          gh api "repos/$TARGET_REPO/dispatches" \
            --method POST \
            --field event_type="claude-task" \
            --field "client_payload[title]=$ISSUE_TITLE" \
            --field "client_payload[body]=$ISSUE_BODY" \
            --field "client_payload[issue_number]=$ISSUE_NUMBER" \
            --field "client_payload[issue_url]=$ISSUE_URL" \
            --field "client_payload[orchestrator_repo]=${{ github.repository }}"
